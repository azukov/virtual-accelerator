name: build-virac

on:
  push:
    tags:
      - '*'
    branches:
      - '*'

jobs:


  ubuntu:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:

        # Imortant! This has to be done before checkout action
        # Otherwise git could fail to check out full history
        # It will cause issues with versioning of the built package
        # since the version depends on gi repository state.
      - name: Install Compilers and Git
        run: apt-get update && apt-get install -y git build-essential

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          set-safe-directory: ''

      # Install Miniconda
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          auto-update-conda: true
          python-version: 3.9
          environment-file: virac.yml
          activate-environment: virac


      - name: Build
        shell: bash -l {0}
        run: |
           .github/workflows/conda-build.sh

      - name: Corrector Test
        shell: bash -l {0}
        run: |
           .github/workflows/corrector-test.sh
